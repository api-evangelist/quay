naftiko: 1.0.0-alpha2
info:
  label: Quay Container Registry API — Build
  description: 'Quay Container Registry API — Build. 2 operations. Lead operation: List builds for a repository. Self-contained
    Naftiko capability covering one Quay business surface.'
  tags:
  - Quay
  - Build
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUAY_API_KEY: QUAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: quay-build
    baseUri: https://quay.io/api/v1
    description: Quay Container Registry API — Build business capability. Self-contained, no shared references.
    resources:
    - name: repository-repository-build
      path: /repository/{repository}/build/
      operations:
      - name: listrepobuilds
        method: GET
        description: List builds for a repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
      - name: requestrepobuild
        method: POST
        description: Request a new build
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.QUAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: quay-build-rest
    port: 8080
    description: REST adapter for Quay Container Registry API — Build. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repository/{repository}/build
      name: repository-repository-build
      description: REST surface for repository-repository-build.
      operations:
      - method: GET
        name: listrepobuilds
        description: List builds for a repository
        call: quay-build.listrepobuilds
        with:
          repository: rest.repository
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: requestrepobuild
        description: Request a new build
        call: quay-build.requestrepobuild
        with:
          repository: rest.repository
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quay-build-mcp
    port: 9090
    transport: http
    description: MCP adapter for Quay Container Registry API — Build. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-builds-repository
      description: List builds for a repository
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: quay-build.listrepobuilds
      with:
        repository: tools.repository
      outputParameters:
      - type: object
        mapping: $.
    - name: request-new-build
      description: Request a new build
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: quay-build.requestrepobuild
      with:
        repository: tools.repository
      outputParameters:
      - type: object
        mapping: $.
