naftiko: 1.0.0-alpha2
info:
  label: Quay Container Registry API — Security
  description: 'Quay Container Registry API — Security. 1 operations. Lead operation: Get vulnerability scan results for a
    manifest. Self-contained Naftiko capability covering one Quay business surface.'
  tags:
  - Quay
  - Security
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUAY_API_KEY: QUAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: quay-security
    baseUri: https://quay.io/api/v1
    description: Quay Container Registry API — Security business capability. Self-contained, no shared references.
    resources:
    - name: repository-repository-manifest-manifestref-security
      path: /repository/{repository}/manifest/{manifestref}/security
      operations:
      - name: getmanifestsecurity
        method: GET
        description: Get vulnerability scan results for a manifest
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
        - name: manifestref
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.QUAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: quay-security-rest
    port: 8080
    description: REST adapter for Quay Container Registry API — Security. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repository/{repository}/manifest/{manifestref}/security
      name: repository-repository-manifest-manifestref-security
      description: REST surface for repository-repository-manifest-manifestref-security.
      operations:
      - method: GET
        name: getmanifestsecurity
        description: Get vulnerability scan results for a manifest
        call: quay-security.getmanifestsecurity
        with:
          repository: rest.repository
          manifestref: rest.manifestref
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quay-security-mcp
    port: 9090
    transport: http
    description: MCP adapter for Quay Container Registry API — Security. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-vulnerability-scan-results-manifest
      description: Get vulnerability scan results for a manifest
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: quay-security.getmanifestsecurity
      with:
        repository: tools.repository
        manifestref: tools.manifestref
      outputParameters:
      - type: object
        mapping: $.
