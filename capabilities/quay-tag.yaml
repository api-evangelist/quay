naftiko: 1.0.0-alpha2
info:
  label: Quay Container Registry API — Tag
  description: 'Quay Container Registry API — Tag. 3 operations. Lead operation: List repository tags. Self-contained Naftiko
    capability covering one Quay business surface.'
  tags:
  - Quay
  - Tag
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUAY_API_KEY: QUAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: quay-tag
    baseUri: https://quay.io/api/v1
    description: Quay Container Registry API — Tag business capability. Self-contained, no shared references.
    resources:
    - name: repository-repository-tag
      path: /repository/{repository}/tag/
      operations:
      - name: listrepotags
        method: GET
        description: List repository tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
    - name: repository-repository-tag-tag
      path: /repository/{repository}/tag/{tag}
      operations:
      - name: changetag
        method: PUT
        description: Create or update a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
        - name: tag
          in: path
          type: string
          required: true
      - name: deletetag
        method: DELETE
        description: Delete a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
        - name: tag
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.QUAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: quay-tag-rest
    port: 8080
    description: REST adapter for Quay Container Registry API — Tag. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/repository/{repository}/tag
      name: repository-repository-tag
      description: REST surface for repository-repository-tag.
      operations:
      - method: GET
        name: listrepotags
        description: List repository tags
        call: quay-tag.listrepotags
        with:
          repository: rest.repository
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/repository/{repository}/tag/{tag}
      name: repository-repository-tag-tag
      description: REST surface for repository-repository-tag-tag.
      operations:
      - method: PUT
        name: changetag
        description: Create or update a tag
        call: quay-tag.changetag
        with:
          repository: rest.repository
          tag: rest.tag
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetag
        description: Delete a tag
        call: quay-tag.deletetag
        with:
          repository: rest.repository
          tag: rest.tag
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quay-tag-mcp
    port: 9090
    transport: http
    description: MCP adapter for Quay Container Registry API — Tag. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-repository-tags
      description: List repository tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: quay-tag.listrepotags
      with:
        repository: tools.repository
      outputParameters:
      - type: object
        mapping: $.
    - name: create-update-tag
      description: Create or update a tag
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: quay-tag.changetag
      with:
        repository: tools.repository
        tag: tools.tag
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-tag
      description: Delete a tag
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: quay-tag.deletetag
      with:
        repository: tools.repository
        tag: tools.tag
      outputParameters:
      - type: object
        mapping: $.
