naftiko: 1.0.0-alpha2
info:
  label: Quay Container Registry API — User
  description: 'Quay Container Registry API — User. 1 operations. Lead operation: Get authenticated user. Self-contained Naftiko
    capability covering one Quay business surface.'
  tags:
  - Quay
  - User
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUAY_API_KEY: QUAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: quay-user
    baseUri: https://quay.io/api/v1
    description: Quay Container Registry API — User business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user/
      operations:
      - name: getloggedinuser
        method: GET
        description: Get authenticated user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.QUAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: quay-user-rest
    port: 8080
    description: REST adapter for Quay Container Registry API — User. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: GET
        name: getloggedinuser
        description: Get authenticated user
        call: quay-user.getloggedinuser
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quay-user-mcp
    port: 9090
    transport: http
    description: MCP adapter for Quay Container Registry API — User. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-authenticated-user
      description: Get authenticated user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: quay-user.getloggedinuser
      outputParameters:
      - type: object
        mapping: $.
