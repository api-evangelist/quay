        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
        - name: tag
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repository-repository-manifest-manifestref
