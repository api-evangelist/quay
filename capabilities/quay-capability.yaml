naftiko: 1.0.0-alpha2
info:
  label: Quay Container Registry API
  description: The Quay API provides programmatic access to the Quay container image registry. Developers can manage repositories,
    organizations, users, robot accounts, teams, builds, build triggers, tags, manifests, vulnerability scans, and access
    permissions. The API supports the full lifecycle of container image distribution including image push and pull workflows,
    automated build configuration via integrations with source code repositories, security scanning of stored images, and
    fine-grained access control via OAuth tokens and robot account credentials. The API is available against Quay.io hosted
    servic
  tags:
  - Quay
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: quay
    baseUri: https://quay.io/api/v1
    description: Quay Container Registry API HTTP API.
    authentication:
      type: bearer
      token: '{{QUAY_TOKEN}}'
    resources:
    - name: repository
      path: /repository
      operations:
      - name: listrepos
        method: GET
        description: List repositories
        inputParameters:
        - name: namespace
          in: query
          type: string
        - name: public
          in: query
          type: boolean
        - name: starred
          in: query
          type: boolean
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createrepo
        method: POST
        description: Create a new repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: repository-repository
      path: /repository/{repository}
      operations:
      - name: getrepo
        method: GET
        description: Get repository details
        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleterepo
        method: DELETE
        description: Delete repository
        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
