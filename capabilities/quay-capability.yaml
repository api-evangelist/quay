      path: /repository/{repository}/tag/{tag}
      operations:
      - name: changetag
        method: PUT
        description: Create or update a tag
        inputParameters:
        - name: repository
          in: path
          type: string
          required: true
        - name: tag
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
