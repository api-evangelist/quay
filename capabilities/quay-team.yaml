naftiko: 1.0.0-alpha2
info:
  label: Quay Container Registry API — Team
  description: 'Quay Container Registry API — Team. 1 operations. Lead operation: Create or update a team. Self-contained
    Naftiko capability covering one Quay business surface.'
  tags:
  - Quay
  - Team
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    QUAY_API_KEY: QUAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: quay-team
    baseUri: https://quay.io/api/v1
    description: Quay Container Registry API — Team business capability. Self-contained, no shared references.
    resources:
    - name: organization-orgname-team-teamname
      path: /organization/{orgname}/team/{teamname}
      operations:
      - name: updateorganizationteam
        method: PUT
        description: Create or update a team
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orgname
          in: path
          type: string
          required: true
        - name: teamname
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.QUAY_API_KEY}}'
  exposes:
  - type: rest
    namespace: quay-team-rest
    port: 8080
    description: REST adapter for Quay Container Registry API — Team. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/organization/{orgname}/team/{teamname}
      name: organization-orgname-team-teamname
      description: REST surface for organization-orgname-team-teamname.
      operations:
      - method: PUT
        name: updateorganizationteam
        description: Create or update a team
        call: quay-team.updateorganizationteam
        with:
          orgname: rest.orgname
          teamname: rest.teamname
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: quay-team-mcp
    port: 9090
    transport: http
    description: MCP adapter for Quay Container Registry API — Team. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: create-update-team
      description: Create or update a team
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: quay-team.updateorganizationteam
      with:
        orgname: tools.orgname
        teamname: tools.teamname
      outputParameters:
      - type: object
        mapping: $.
